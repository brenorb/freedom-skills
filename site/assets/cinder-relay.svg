<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" role="img" aria-labelledby="title desc">
  <title id="title">Cinder carries a portable ember across a knowledge relay</title>
  <desc id="desc">A small phoenix hauls a glowing capsule over a suspended bridge from fragmented tools toward a living beacon.</desc>
  <defs>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%"><feTurbulence baseFrequency=".8" numOctaves="2" seed="8" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="1.4"/></filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="18" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="dots" width="9" height="9" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.15" fill="#10372f" opacity=".22"/></pattern>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#8cd7dd"/><stop offset="1" stop-color="#d8f0c6"/></linearGradient>
  </defs>
  <style>
    .line{fill:none;stroke:#102f29;stroke-width:14;stroke-linecap:round;stroke-linejoin:round}.thin{stroke-width:7}.ember{animation:pulse 2.8s ease-in-out infinite;transform-origin:center}.wing{animation:wing 1.8s ease-in-out infinite;transform-origin:655px 560px}.capsule{animation:float 3s ease-in-out infinite}.signal{stroke-dasharray:10 22;animation:dash 12s linear infinite}.leaf{animation:sway 4s ease-in-out infinite;transform-origin:bottom}@keyframes pulse{50%{transform:scale(1.08);opacity:.85}}@keyframes wing{50%{transform:rotate(-7deg)}}@keyframes float{50%{transform:translateY(-8px)}}@keyframes dash{to{stroke-dashoffset:-320}}@keyframes sway{50%{transform:rotate(3deg)}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>

  <path d="M32 765C210 641 310 722 437 655S735 568 1168 665" fill="none" stroke="#b9e588" stroke-width="120" opacity=".26"/>
  <path d="M10 828C240 708 357 790 511 719s385-101 701 6" fill="none" stroke="#183f36" stroke-width="190" opacity=".42"/>

  <!-- fragmented tool shore -->
  <g filter="url(#rough)" opacity=".95">
    <path class="line" d="M74 646v-260h178v260M68 480h192M68 563h192"/>
    <path class="line thin" d="M105 432h53v35h-53zM179 508h47v35h-47zM111 586h62v35h-62z"/>
    <path class="line" d="M292 624l-26-132 100-20 27 135z" fill="#eff4df"/>
    <path class="line thin" d="M294 516l48-10M301 550l63-13M308 584l42-9"/>
    <circle cx="175" cy="325" r="52" fill="#ff6b35" opacity=".16"/>
    <path class="line thin" d="M175 280v90M130 325h90"/>
  </g>

  <!-- suspension relay -->
  <g filter="url(#rough)">
    <path class="line" d="M356 701c102-226 298-283 509-136 78 54 136 63 247 59"/>
    <path class="line thin" d="M386 676c119-120 289-140 441-53 102 58 183 65 285 52"/>
    <path class="line thin signal" stroke="#ff6b35" d="M387 648c133-94 276-105 432-30 108 51 186 59 296 36"/>
    <path class="line" d="M417 628v126M499 576v138M588 538v148M686 521v143M786 545v135M878 594v112M981 627v93"/>
    <path class="line" d="M382 753c230-44 474-36 744 2"/>
    <path d="M398 721c224-39 461-31 705 2" fill="none" stroke="#eff4df" stroke-width="22" stroke-linecap="round"/>
    <path d="M398 721c224-39 461-31 705 2" fill="none" stroke="url(#dots)" stroke-width="18"/>
  </g>

  <!-- Cinder, load-bearing -->
  <g filter="url(#rough)">
    <g class="ember" filter="url(#glow)"><path d="M655 350c35 49 4 70 47 97 2-36 33-42 42-76 27 44 21 95-21 126h-125c-27-35-22-83 16-111-5 31 9 44 24 51-4-33 4-61 17-87Z" fill="#ff6b35" stroke="#102f29" stroke-width="14" stroke-linejoin="round"/></g>
    <path d="M575 462c-63 36-88 114-66 188 20 67 77 103 154 96 85-7 132-61 123-140-8-77-58-142-127-157-29-6-58-2-84 13Z" fill="#f8f2df" stroke="#102f29" stroke-width="16"/>
    <path d="M553 572c-38 9-56 36-51 77 4 32 25 48 55 47" fill="#f8f2df" stroke="#102f29" stroke-width="15" stroke-linecap="round"/>
    <g class="wing"><path d="M711 560c39 9 58 34 54 71-4 32-24 49-52 49" fill="#f8f2df" stroke="#102f29" stroke-width="15" stroke-linecap="round"/></g>
    <circle cx="612" cy="548" r="10" fill="#102f29"/><circle cx="681" cy="548" r="10" fill="#102f29"/>
    <path d="M638 570q16-13 32 0-15 17-32 0Z" fill="#102f29"/>
    <path class="line thin" d="M600 740l-8 29M697 738l9 29"/>
  </g>

  <!-- carried portable skill capsule -->
  <g class="capsule" filter="url(#rough)">
    <path d="M782 598q23-23 46 0l50 51q18 18 0 36l-49 49q-19 19-38 0l-50-50q-18-19 1-38Z" fill="#ffe378" stroke="#102f29" stroke-width="13"/>
    <circle cx="830" cy="666" r="22" fill="#ff6b35" stroke="#102f29" stroke-width="9"/>
    <path class="line thin" d="M816 666h28M830 652v28"/>
  </g>
  <path class="line thin" d="M747 627c31 7 39 15 57 30"/>

  <!-- living beacon shore -->
  <g filter="url(#rough)">
    <path class="line" d="M1023 620V363h106v267M1000 637h153"/>
    <circle class="ember" cx="1076" cy="323" r="47" fill="#ffe378" stroke="#102f29" stroke-width="13" filter="url(#glow)"/>
    <path class="line thin" d="M1076 250v-51M1005 278l-38-34M1144 278l39-34M1015 347l-51 18M1137 347l52 18"/>
    <g class="leaf"><path d="M986 619c-47-70-27-126 35-159 21 69 4 113-35 159Z" fill="#92d13d" stroke="#102f29" stroke-width="12"/><path class="line thin" d="M985 615c1-51 11-94 36-155"/></g>
    <g class="leaf" style="animation-delay:-1.2s"><path d="M1150 621c59-65 56-122 5-164-33 62-29 109-5 164Z" fill="#73c9cf" stroke="#102f29" stroke-width="12"/><path class="line thin" d="M1150 615c10-52 11-98 5-158"/></g>
  </g>

  <path d="M64 842h1090" stroke="#eff4df" stroke-width="4" opacity=".22"/>
  <circle cx="250" cy="870" r="5" fill="#ffe378"/><circle cx="960" cy="875" r="5" fill="#ff6b35"/>
</svg>
