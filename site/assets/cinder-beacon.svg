<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Cinder lights a public beacon</title><desc id="desc">Cinder turns a hand crank that sends warm signals outward to a community.</desc>
  <defs><filter id="rough"><feTurbulence baseFrequency=".65" numOctaves="2" seed="32" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="1.2"/></filter><filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="24" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <style>.beam{fill:none;stroke:#ffe378;stroke-width:8;stroke-linecap:round;opacity:.45;animation:beam 3s ease-in-out infinite;transform-origin:540px 245px}.b2{animation-delay:-1s}.b3{animation-delay:-2s}.crank{animation:crank 4s linear infinite;transform-origin:449px 574px}@keyframes beam{50%{opacity:1;transform:scale(1.04)}}@keyframes crank{to{transform:rotate(360deg)}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}</style>
