  <path d="M436 278h208l51 322H384z" fill="#153d35" stroke="#102f29" stroke-width="15"/><path d="M410 426h260M396 518h288" stroke="#8ad6dc" stroke-width="9"/><circle cx="540" cy="472" r="49" fill="#ff6b35" stroke="#102f29" stroke-width="11"/><g class="crank"><path d="M540 472v-76" stroke="#f6f1df" stroke-width="12" stroke-linecap="round"/><circle cx="540" cy="388" r="17" fill="#f6f1df"/></g>
