<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 740" role="img" aria-labelledby="title desc">
  <title id="title">Cinder operates a hand-built knowledge relay</title>
  <desc id="desc">Fragmented documents pass through four physical stations and leave as one portable skill capsule.</desc>
  <defs>
    <filter id="rough"><feTurbulence baseFrequency=".65" numOctaves="2" seed="17" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="1.1"/></filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="13" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grain" width="8" height="8" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#f6f1df" opacity=".18"/></pattern>
  </defs>
  <style>.line{fill:none;stroke:#f6f1df;stroke-width:12;stroke-linecap:round;stroke-linejoin:round}.thin{stroke-width:6}.flow{stroke-dasharray:10 21;animation:dash 8s linear infinite}.lever{animation:lever 2.4s ease-in-out infinite;transform-origin:752px 336px}.lamp{animation:pulse 2s ease-in-out infinite}@keyframes dash{to{stroke-dashoffset:-240}}@keyframes lever{50%{transform:rotate(-7deg)}}@keyframes pulse{50%{opacity:.6;transform:scale(.96)}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}</style>
  <path class="line flow" stroke="#ff6b35" d="M98 397C278 395 349 395 514 396s237 0 420 0 280 0 458 0"/>
  <!-- loose manuals -->
  <g filter="url(#rough)"><path class="line" d="M61 305l116-38 51 160-117 38zM145 243l112 9-14 164-112-9z" fill="#163d35"/><path class="line thin" d="M97 326l55-18M106 355l75-24M176 297l44 4M173 327l55 5"/></g>
  <!-- station 1: recognition lens -->
  <g filter="url(#rough)"><circle cx="358" cy="394" r="106" fill="#163d35" stroke="#f6f1df" stroke-width="12"/><circle cx="358" cy="394" r="58" fill="#8ad6dc" stroke="#f6f1df" stroke-width="9"/><path class="line" d="M424 469l64 64"/><circle cx="358" cy="394" r="14" fill="#ffe378" filter="url(#glow)"/></g>
  <!-- station 2: drawer library -->
  <g filter="url(#rough)"><path class="line" d="M516 269h230v248H516z" fill="#163d35"/><path class="line thin" d="M516 352h230M516 435h230M631 269v248"/><circle cx="573" cy="310" r="9" fill="#ff6b35"/><circle cx="688" cy="393" r="9" fill="#ff6b35"/><circle cx="573" cy="476" r="9" fill="#ffe378"/></g>
  <!-- Cinder as operator -->
  <g filter="url(#rough)"><path d="M760 194c24 35 3 52 31 70 2-25 23-29 29-52 19 31 15 66-14 87h-87c-19-24-15-57 11-77-3 22 7 31 17 36-2-23 3-43 13-64Z" fill="#ff6b35" stroke="#f6f1df" stroke-width="11"/><path d="M704 275c-45 26-62 82-46 135 14 48 55 73 109 68 60-5 94-44 88-101-6-54-42-101-91-111-21-5-41-2-60 9Z" fill="#f6f1df" stroke="#102f29" stroke-width="12"/><circle cx="730" cy="337" r="8" fill="#102f29"/><circle cx="779" cy="337" r="8" fill="#102f29"/><path d="M747 354q12-10 24 0-11 12-24 0Z" fill="#102f29"/><path d="M685 353c-26 7-35 27-27 56" fill="none" stroke="#102f29" stroke-width="11" stroke-linecap="round"/><path class="lever" d="M825 368l82-99" fill="none" stroke="#f6f1df" stroke-width="12" stroke-linecap="round"/><circle cx="912" cy="260" r="19" fill="#ffe378" stroke="#f6f1df" stroke-width="8"/></g>
  <!-- station 3: visible action press -->
  <g filter="url(#rough)"><path class="line" d="M922 307h192v198H922z" fill="#163d35"/><path class="line" d="M964 307v-66h108v66M943 386h150"/><path d="M971 414h94v58h-94z" fill="#8ad6dc" stroke="#f6f1df" stroke-width="8"/><path class="line thin" d="M1018 241v-52"/><circle class="lamp" cx="1018" cy="166" r="24" fill="#ff6b35" filter="url(#glow)"/></g>
  <!-- portable output -->
  <g filter="url(#rough)"><path d="M1221 316q25-25 50 0l90 90q20 20 0 40l-73 73q-20 20-40 0l-90-90q-21-21 0-42Z" fill="#ffe378" stroke="#f6f1df" stroke-width="12"/><circle cx="1260" cy="418" r="42" fill="#ff6b35" stroke="#102f29" stroke-width="10"/><path d="M1237 418h46M1260 395v46" stroke="#102f29" stroke-width="8" stroke-linecap="round"/></g>
  <path class="line thin" d="M1201 541c92 42 165 42 225 4M1201 571c92 42 165 42 225 4" opacity=".4"/>
  <rect x="40" y="590" width="1380" height="3" fill="#f6f1df" opacity=".16"/>
</svg>
