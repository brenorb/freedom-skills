<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 700" role="img" aria-labelledby="title">
  <title id="title">Cinder keeps a small flame alive inside four rings of trust</title>
  <defs><filter id="rough"><feTurbulence baseFrequency=".7" numOctaves="2" seed="22" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="1.2"/></filter><filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="18" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <style>.ring{fill:none;stroke:#8ad6dc;stroke-width:4;opacity:.3;transform-origin:center;animation:ring 7s ease-in-out infinite}.r2{animation-delay:-2s}.r3{animation-delay:-4s}.flame{animation:pulse 2.2s ease-in-out infinite;transform-origin:center}@keyframes ring{50%{transform:scale(1.04);opacity:.55}}@keyframes pulse{50%{transform:scale(1.06)}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}</style>
  <circle class="ring" cx="350" cy="350" r="325"/><circle class="ring r2" cx="350" cy="350" r="255"/><circle class="ring r3" cx="350" cy="350" r="184"/>
